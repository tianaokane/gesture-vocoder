<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gesture Vocoder</title>
  <style>
    body {
      background: #0a0a0f;
      color: #e0e0ff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      margin: 0;
    }

    h1 { font-size: 1.2rem; letter-spacing: 0.2em; margin-bottom: 8px; }
    p  { color: #666; font-size: 0.8rem; margin-bottom: 24px; }

    canvas {
      background: #0f0f1a;
      border: 1px solid #222244;
      border-radius: 8px;
    }

    button {
      margin-top: 24px;
      padding: 12px 32px;
      background: #1a1a3a;
      color: #8888ff;
      border: 1px solid #333366;
      border-radius: 6px;
      font-family: monospace;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover { background: #22224a; }

    #status {
      margin-top: 16px;
      font-size: 0.75rem;
      color: #444466;
    }
  </style>
</head>
<body>

  <h1>GESTURE VOCODER</h1>
  <p>phase 1 — mic input</p>

  <canvas id="waveform" width="640" height="200"></canvas>

  <button id="startBtn">Start Microphone</button>
  <div id="status">waiting...</div>

  <script>

    // References to HTML elements
    const canvas   = document.getElementById('waveform');
    const ctx      = canvas.getContext('2d');   // the canvas drawing tool
    const startBtn = document.getElementById('startBtn');
    const status   = document.getElementById('status');

    // FILLED ON START
    let audioContext = null;
    let analyser     = null;
    let dataArray    = null;

    // ON START
    startBtn.addEventListener('click', async () => {

      // AudioContext must be created after a user gesture (browser rule)
      audioContext = new AudioContext();

      // Ask the browser for microphone access
      // This returns a Promise — the 'await' pauses until the mic is ready
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      // Wrap the mic stream as an audio node so we can connect things to it
      const micNode = audioContext.createMediaStreamSource(stream);

      // An AnalyserNode lets us read the waveform data without modifying audio
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048; // how many samples to look at (more = more detail)

      // Connect: mic → analyser  (we do NOT connect analyser → speakers yet)
      micNode.connect(analyser);

      // Create a buffer (a plain array) the analyser will write data into
      dataArray = new Uint8Array(analyser.fftSize);

      status.textContent = 'mic active — speak and watch the wave';
      startBtn.disabled = true;

      // Start the animation loop
      drawWaveform();

    });

    // DRAWING LOOP (60 PER SECOND)
    function drawWaveform() {

      // Schedule this function to run again on the next animation frame
      requestAnimationFrame(drawWaveform);

      // Ask the analyser to fill dataArray with the current waveform
      // Values are 0-255, where 128 = silence (the midpoint)
      analyser.getByteTimeDomainData(dataArray);

      // Clear the canvas
      ctx.fillStyle = '#0f0f1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw the waveform line
      ctx.lineWidth   = 2;
      ctx.strokeStyle = '#5555ff';
      ctx.beginPath();

      const sliceWidth = canvas.width / dataArray.length;
      let x = 0;

      for (let i = 0; i < dataArray.length; i++) {
        // Convert the 0–255 value to a y position on the canvas
        const v = dataArray[i] / 128.0;   // 1.0 = silence
        const y = (v * canvas.height) / 2;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }

        x += sliceWidth;
      }

      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();
    }

  </script>
</body>
</html>
