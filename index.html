<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gesture Vocoder</title>
  <style>
    body {
      background: #0a0a0f;
      color: #e0e0ff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      margin: 0;
    }

    h1 { font-size: 1.2rem; letter-spacing: 0.2em; margin-bottom: 8px; }
    p  { color: #666; font-size: 0.8rem; margin-bottom: 24px; }

    canvas {
      background: #0f0f1a;
      border: 1px solid #222244;
      border-radius: 8px;
    }

    button {
      margin-top: 24px;
      padding: 12px 32px;
      background: #1a1a3a;
      color: #8888ff;
      border: 1px solid #333366;
      border-radius: 6px;
      font-family: monospace;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover { background: #22224a; }

    #status {
      margin-top: 16px;
      font-size: 0.75rem;
      color: #444466;
    }
  </style>
</head>
<body>

  <h1>GESTURE VOCODER</h1>
  <p>phase 1 — mic input</p>

  <canvas id="waveform" width="640" height="200"></canvas>

  <button id="startBtn">Start Microphone</button>
  <div id="status">waiting...</div>

  <script>

    const NUM_BANDS  = 16;
    const MIN_FREQ   = 80;
    const MAX_FREQ   = 8000;
    const CARRIER_HZ = 120;

    const canvas   = document.getElementById('waveform');
    const ctx      = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const status   = document.getElementById('status');

    let audioContext = null;
    let analyser     = null;
    let dataArray    = null;
    let mode         = 'robot';
    let micStream    = null;

    let modulatorFilters = [];
    let carrierFilters   = [];
    let envelopes        = [];
    let carrierGains     = [];
    let oscillators      = [];
    let envelopeBuffers  = [];

    function getBandFrequencies() {
      const bands = [];
      for (let i = 0; i < NUM_BANDS; i++) {
        const low    = MIN_FREQ * Math.pow(MAX_FREQ / MIN_FREQ, i / NUM_BANDS);
        const high   = MIN_FREQ * Math.pow(MAX_FREQ / MIN_FREQ, (i + 1) / NUM_BANDS);
        const center = Math.sqrt(low * high);
        bands.push({ low, high, center });
      }
      return bands;
    }

    function makeRectifierCurve() {
      const n     = 256;
      const curve = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        const x  = (i * 2) / n - 1;
        curve[i] = Math.abs(x);
      }
      return curve;
    }

    function createOscillators(frequency) {
      oscillators.forEach(o => { try { o.stop(); } catch(e) {} });
      oscillators = [];

      if (mode === 'robot') {
        const osc = audioContext.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(frequency, audioContext.currentTime);
        osc.start();
        oscillators.push(osc);
      } else {
        [-15, -5, 5, 15].forEach(detuneCents => {
          const osc = audioContext.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(frequency, audioContext.currentTime);
          osc.detune.setValueAtTime(detuneCents, audioContext.currentTime);
          osc.start();
          oscillators.push(osc);
        });
      }

      return oscillators;
    }

    function buildVocoder(micNode, frequency) {
      const bands = getBandFrequencies();

      const outputMerger = audioContext.createGain();
      outputMerger.gain.value = 0.7;

      const oscs = createOscillators(frequency);

      modulatorFilters = [];
      carrierFilters   = [];
      envelopes        = [];
      carrierGains     = [];
      envelopeBuffers  = [];

      bands.forEach((band, i) => {
        const modFilter = audioContext.createBiquadFilter();
        modFilter.type            = 'bandpass';
        modFilter.frequency.value = band.center;
        modFilter.Q.value         = 2;

        const rectifier = audioContext.createWaveShaper();
        rectifier.curve = makeRectifierCurve();

        const envFilter = audioContext.createBiquadFilter();
        envFilter.type            = 'lowpass';
        envFilter.frequency.value = 10;

        micNode.connect(modFilter);
        modFilter.connect(rectifier);
        rectifier.connect(envFilter);

        const carFilter = audioContext.createBiquadFilter();
        carFilter.type            = 'bandpass';
        carFilter.frequency.value = band.center;
        carFilter.Q.value         = 2;

        const carrierGain = audioContext.createGain();
        carrierGain.gain.value = 0;

        oscs.forEach(osc => osc.connect(carFilter));
        carFilter.connect(carrierGain);
        carrierGain.connect(outputMerger);

        modulatorFilters.push(modFilter);
        carrierFilters.push(carFilter);
        envelopes.push(envFilter);
        carrierGains.push(carrierGain);

        const reader = audioContext.createAnalyser();
        reader.fftSize = 256;
        envFilter.connect(reader);
        envelopeBuffers.push({ reader, buffer: new Float32Array(reader.fftSize) });
      });

      outputMerger.connect(audioContext.destination);
    }

    function updateEnvelopes() {
      envelopeBuffers.forEach(({ reader, buffer }, i) => {
        reader.getFloatTimeDomainData(buffer);
        let sum = 0;
        for (let s = 0; s < buffer.length; s++) {
          sum += buffer[s] * buffer[s];
        }
        const rms = Math.sqrt(sum / buffer.length);
        carrierGains[i].gain.setTargetAtTime(
          Math.min(rms * 12, 1.0),
          audioContext.currentTime,
          0.01
        );
      });
    }

    function addModeButtons() {
      const container = document.createElement('div');
      container.style.cssText = 'display:flex; gap:12px; margin-top:16px;';

      ['robot', 'choir'].forEach(m => {
        const btn = document.createElement('button');
        btn.textContent = m;
        btn.style.opacity = m === mode ? '1' : '0.4';
        btn.addEventListener('click', () => {
          mode = m;
          const micNode = audioContext.createMediaStreamSource(micStream);
          buildVocoder(micNode, CARRIER_HZ);
          container.querySelectorAll('button').forEach(b => {
            b.style.opacity = b.textContent === mode ? '1' : '0.4';
          });
        });
        container.appendChild(btn);
      });

      document.body.appendChild(container);
    }

    function drawLoop() {
      requestAnimationFrame(drawLoop);

      if (envelopeBuffers.length > 0) updateEnvelopes();

      analyser.getByteTimeDomainData(dataArray);

      ctx.fillStyle = '#0f0f1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.lineWidth   = 2;
      ctx.strokeStyle = mode === 'robot' ? '#5555ff' : '#55aaff';
      ctx.beginPath();

      const sliceWidth = canvas.width / dataArray.length;
      let x = 0;

      for (let i = 0; i < dataArray.length; i++) {
        const v = dataArray[i] / 128.0;
        const y = (v * canvas.height) / 2;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        x += sliceWidth;
      }

      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();
    }

    startBtn.addEventListener('click', async () => {
      audioContext = new AudioContext();
      micStream    = await navigator.mediaDevices.getUserMedia({ audio: true });
      const micNode = audioContext.createMediaStreamSource(micStream);

      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      micNode.connect(analyser);
      dataArray = new Uint8Array(analyser.fftSize);

      buildVocoder(micNode, CARRIER_HZ);

      status.textContent = 'vocoder active — speak into the mic';
      startBtn.disabled  = true;

      addModeButtons();
      drawLoop();
    });

  </script>
</body>
</html>
